<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jogo da Velha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../prize.css">
</head>
<body>
    <div class="top-actions">
        <a href="../index.html" class="menu-btn">Voltar ao menu</a>
    </div>

    <h1>Jogo da Velha</h1>
    <div class="container">
        <div data-index="0" class="box"></div>
        <div data-index="1" class="box"></div>
        <div data-index="2" class="box"></div>
        <div data-index="3" class="box"></div>
        <div data-index="4" class="box"></div>
        <div data-index="5" class="box"></div>
        <div data-index="6" class="box"></div>
        <div data-index="7" class="box"></div>
        <div data-index="8" class="box"></div>
    </div>
    <div class="status"></div>
    <button class="restartBtn">Reiniciar</button>

    <div id="prize-overlay" class="prize-overlay">
      <div class="prize-box">
        <div class="prize-emoji">🏆</div>
        <h2 class="prize-title">PARABÉNS!</h2>
        <p class="prize-sub">Você ganhou um prêmio!</p>
        <p class="prize-achievement" id="prize-achievement"></p>
        <p class="prize-cta">Mostre esta tela a um dos nossos colaboradores</p>
        <div class="prize-actions">
          <button class="prize-btn-play" type="button" onclick="location.reload()">Jogar de novo</button>
          <a class="prize-btn-menu" href="../index.html">Voltar ao menu</a>
        </div>
      </div>
    </div>
    <script src="../prize.js"></script>
    <script src="index.js"></script>
</body>
</html>

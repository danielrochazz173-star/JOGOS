<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Whack-a-Mole</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../prize.css" />
  </head>
  <body>
    <div class="top-actions">
      <a href="../../index.html" class="menu-btn">Voltar ao menu</a>
    </div>
    <h1>Whack-a-Mole</h1>
    <h2>Pontos: <span class="score">0</span></h2>
    <button id="start" type="button">Iniciar</button>
    <div class="game">
      <div class="hole hole1">
        <div class="mole"></div>
      </div>
      <div class="hole hole2">
        <div class="mole"></div>
      </div>
      <div class="hole hole3">
        <div class="mole"></div>
      </div>
      <div class="hole hole4">
        <div class="mole"></div>
      </div>
      <div class="hole hole5">
        <div class="mole"></div>
      </div>
      <div class="hole hole6">
        <div class="mole"></div>
      </div>
    </div>
    <div id="prize-overlay" class="prize-overlay">
      <div class="prize-box">
        <div class="prize-emoji">🏆</div>
        <h2 class="prize-title">PARABÉNS!</h2>
        <p class="prize-sub">Você ganhou um prêmio!</p>
        <p class="prize-achievement" id="prize-achievement"></p>
        <p class="prize-cta">Mostre esta tela a um dos nossos colaboradores</p>
        <div class="prize-actions">
          <button class="prize-btn-play" type="button" onclick="location.reload()">Jogar de novo</button>
          <a class="prize-btn-menu" href="../../index.html">Voltar ao menu</a>
        </div>
      </div>
    </div>
    <script src="../prize.js"></script>
    <script src="script.js"></script>
  </body>
</html>
